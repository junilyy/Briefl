spring:
  application:
    name: briefl

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
  news-search-url: https://openapi.naver.com/v1/search/news.json

openai:
  api-key: ${OPENAI_API_KEY:}
  analysis-mode: ${AI_ANALYSIS_MODE:mock}
  model: ${OPENAI_MODEL:gpt-5.4-nano}
  responses-url: https://api.openai.com/v1/responses
  max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:2000}

external-api:
  timeout:
    connect-millis: ${EXTERNAL_API_CONNECT_TIMEOUT_MILLIS:3000}
    response-seconds: ${EXTERNAL_API_RESPONSE_TIMEOUT_SECONDS:10}
    naver-request-seconds: ${NAVER_API_REQUEST_TIMEOUT_SECONDS:10}
    open-ai-request-seconds: ${OPENAI_API_REQUEST_TIMEOUT_SECONDS:30}

server:
  port: 8080
